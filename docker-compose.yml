version: '3.8'

services:
  mr_money:
    build: .
    container_name: mr_money_trading_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # No ports exposed externally for security
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
